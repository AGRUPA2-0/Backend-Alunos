<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        @page {
            size: A4;
            margin: 1cm;
        }
        body { font-family: sans-serif; padding: 20px; color: #333; }
        .header { text-align: center; margin-bottom: 30px; }
        .resumo-card {
            background-color: #f0f7ff; border-radius: 8px;
            padding: 15px; margin-bottom: 25px; display: table; width: 100%;
        }
        .resumo-item { display: table-cell; width: 50%; font-weight: bold; }
        .grupo-header { font-size: 1.2em; font-weight: bold; margin-top: 20px; page-break-after: avoid;
            page-break-before: auto; }
        .total-alunos { color: #666; font-size: 0.9em; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { background-color: #4a90e2; color: white; padding: 10px; text-align: left; }
        td { border: 1px solid #ddd; padding: 8px; }
        tr { page-break-inside: avoid; }
        .empty-msg { font-style: italic; color: #888; text-align: center; }
    </style>
</head>
<body>
<div class="header">
    <h1>AGRUPA - Relatório de Células</h1>
    <p th:text="'Atividade: ' + ${dados.nomeAtividade}"></p>
    <p th:text="'Gerado em: ' + ${dados.dataGeracao}"></p>
</div>

<div class="resumo-card">
    <div class="resumo-item" th:text="'Total de Células: ' + ${dados.totalCelulas}"></div>
    <div class="resumo-item" th:text="'Total de Alunos: ' + ${dados.totalAlunos}"></div>
</div>

<div th:each="grupo : ${dados.grupos}">
    <div class="grupo-header" th:text="${grupo.identificador}"></div>
    <div class="total-alunos" th:text="'Total: ' + ${grupo.totalIntegrantes} + ' / ' + ${grupo.capacidadeMaxima} + ' alunos'"></div>

    <table>
        <thead>
        <tr>
            <th style="width: 10%;">#</th>
            <th>Nome do Aluno</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="aluno, iter : ${grupo.alunos}">
            <td th:text="${iter.index + 1}"></td>
            <td th:text="${aluno}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(grupo.alunos)}">
            <td colspan="2" class="empty-msg">Nenhum aluno</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
